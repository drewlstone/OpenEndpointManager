<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<!-- PolyProv master config served to all phones when no per-MAC master exists.
     Phones request this first, then load their <MAC>.cfg.
     In production this file is RENDERED dynamically per device by the API;
     this static copy is a fallback / reference. -->
<APPLICATION
  APP_FILE_PATH=""
  CONFIG_FILES="sip-global.cfg"
  MISC_FILES=""
  LOG_FILE_DIRECTORY="logs"
  OVERRIDES_DIRECTORY="overrides"
  CONTACTS_DIRECTORY="contacts"
/>
