# Standalone UI vhost for a shared NGINX fronting all planes.
# In Docker Compose the UI ships with its own nginx (ui/nginx-ui.conf); this file
# is for environments where one NGINX serves UI + admin together.

upstream ui_static { server ui:80; }
upstream admin_api_for_ui { server admin-api:8000; }

server {
    listen 80;
    server_name console.example.com;

    location /api/ {
        proxy_pass http://admin_api_for_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://admin_api_for_ui; }
    location = /readyz  { proxy_pass http://admin_api_for_ui; }
    location = /metrics { proxy_pass http://admin_api_for_ui; }

    location / {
        proxy_pass http://ui_static;
        proxy_set_header Host $host;
    }
}
