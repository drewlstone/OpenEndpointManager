# Provisioning plane vhost.
# Serves firmware as static files directly; proxies dynamic config to the API.
# Rate-limited per-IP and (via $mac) per-device.

# Extract MAC from request URI like /provisioning/0004f2aabbcc.cfg
map $uri $mac {
    default                                   "";
    "~/provisioning/(?<m>[0-9a-fA-F]{12})"    $m;
}

# Rate limit zones: per-IP for boot storms, per-MAC for misbehaving devices.
limit_req_zone $binary_remote_addr zone=prov_ip:10m rate=20r/s;
limit_req_zone $mac                zone=prov_mac:10m rate=2r/s;

upstream prov_api {
    least_conn;
    server prov-api:8000 max_fails=3 fail_timeout=10s;
    # add more prov-api instances here for horizontal scaling
    keepalive 64;
}

server {
    listen 80 default_server;
    server_name _;

    # --- Firmware: served directly from disk/object-store mount, NOT the API ---
    location /provisioning/firmware/ {
        alias /data/provisioning_root/firmware/;
        limit_req zone=prov_ip burst=50 nodelay;
        add_header Cache-Control "public, max-age=86400";
        access_log /var/log/nginx/firmware.log;
        try_files $uri =404;
    }

    # --- Dynamic config: proxied to the provisioning API (cache-first) ---
    location /provisioning/ {
        limit_req zone=prov_ip  burst=40 nodelay;
        limit_req zone=prov_mac burst=10 nodelay;

        proxy_pass http://prov_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /healthz { proxy_pass http://prov_api; }

    # Reject anything else on the provisioning vhost.
    location / { return 404; }
}

