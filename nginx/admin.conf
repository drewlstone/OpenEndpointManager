# Admin/API plane vhost. Low volume, stricter limits, HTTPS+HSTS in prod.

limit_req_zone $binary_remote_addr zone=admin_ip:10m rate=10r/s;

upstream admin_api {
    server admin-api:8000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    server_name admin.example.com;

    location / {
        limit_req zone=admin_ip burst=20 nodelay;
        proxy_pass http://admin_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}

