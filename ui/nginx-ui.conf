# Serves the built SPA and proxies /api to the admin API so the browser sees a
# single origin (no CORS). In Docker Compose the admin-api service is reachable
# by name; override the upstream for other environments.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + ops endpoints proxied to the admin API
    location /api/ {
        proxy_pass http://admin-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /healthz { proxy_pass http://admin-api:8000; }
    location = /readyz  { proxy_pass http://admin-api:8000; }
    location = /metrics { proxy_pass http://admin-api:8000; }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
